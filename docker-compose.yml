########################################################################################################################
#                                  Use this docker-compose file as a sample.                                           #
########################################################################################################################
services:
  app:
    image: thevickypedia/pyfilebrowser
    container_name: pyfilebrowser
    build:
     context: .
     dockerfile: Dockerfile
    volumes:
      - ./branding:/app/branding
      - ./secrets:/app/secrets
      - ./logs:/app/logs
      # Sample volumes that are mounted and exposed for ROOT (via .config.env)
      # NOTE: Dockerized version DOES NOT support SYMLINKS and will make storage information (in the UI) unreliable
      - /Users/vicky/Desktop:/mnt/Desktop:rw
      - /Users/vicky/Downloads:/mnt/Downloads:rw
      - /Users/vicky/Documents:/mnt/Documents:ro
    environment:
      - SECRETS_PATH=/app/secrets
      - ADDRESS=0.0.0.0
      - PORT=80
      - LOG=file
      - PYFB_PROXY=false
      - PYFB_LOG_LEVEL=DEBUG
      - PYFB_EXTRA_ENV=/app/secrets/extra.yaml
    ports:
      # host_port:container_port
      - "${FB_PORT:-8000}:80"
    deploy:
      # 'reservations' key is supported only in swarm mode
      resources:
        limits:
          cpus: '2'
          memory: 1G
